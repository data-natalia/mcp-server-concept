name: Build and Push {{ServerName}} Docker Image to ACR

on:
  push:
    paths:
      - 'MCPServers/{{ServerName}}/**'
      - '.github/workflows/docker-publish-{{servername}}.yml'
      - 'Infrastructure/containerApp-{{ServerName}}.dev.bicepparam'
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-dev:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/docker-publish-template.yml
    with:
      mcp_server: '{{ServerName}}'
      image_name: '{{servername}}'
      docker_context: 'MCPServers'
      environment: dev
    secrets: inherit

  deploy-dev:
    needs: publish-dev
    if: needs.publish-dev.result == 'success'
    uses: ./.github/workflows/docker-deploy-containerapp-template.yml
    with:
      parameter_file_name: containerApp-{{ServerName}}.dev.bicepparam
      environment: dev
    secrets: inherit

  publish-prod:
    if: github.event_name == 'release' && startsWith(github.ref, 'refs/tags/{{servername}}/')
    uses: ./.github/workflows/docker-publish-template.yml
    with:
      mcp_server: '{{ServerName}}'
      image_name: '{{servername}}'
      docker_context: 'MCPServers'
      environment: prod
    secrets: inherit

  deploy-prod:
    needs: publish-prod
    if: needs.publish-prod.result == 'success'
    uses: ./.github/workflows/docker-deploy-containerapp-template.yml
    with:
      parameter_file_name: containerApp-{{ServerName}}.prod.bicepparam
      environment: prod
      image_tag: ${{ needs.publish-prod.outputs.image_tag }}
    secrets: inherit
